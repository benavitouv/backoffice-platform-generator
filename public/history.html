<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deployment History — BackOffice Demo Generator</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <div class="view">
      <main class="shell">

        <!-- Header -->
        <div class="history-topbar">
          <a href="/" class="back-btn">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Generator
          </a>
          <div class="history-topbar-right">
            <span id="history-count" class="history-count" hidden></span>
            <button id="refresh-btn" class="ghost-btn history-refresh-btn">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12.5 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Refresh
            </button>
            <a href="/" class="primary-btn">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              New Demo
            </a>
          </div>
        </div>

        <header class="page-header history-page-header">
          <h1>Deployment History</h1>
          <p class="header-sub" id="history-sub">Loading deployments…</p>
        </header>

        <!-- Loading -->
        <div id="history-loading" class="history-loading-wrap">
          <div class="progress-spinner"></div>
        </div>

        <!-- Table -->
        <div id="history-content" hidden class="history-table-wrap">
          <table class="history-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Customer</th>
                <th>Template</th>
                <th>Language</th>
                <th>Live URL</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>

        <!-- Empty state -->
        <div id="history-empty" hidden class="history-empty">
          <svg class="history-empty-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="14" width="48" height="40" rx="6" stroke="currentColor" stroke-width="2"/>
            <path d="M8 24h48" stroke="currentColor" stroke-width="2"/>
            <path d="M20 8v12M44 8v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 36h24M20 44h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <strong>No deployments yet</strong>
          <p>Generate your first branded demo site and it will appear here.</p>
          <a href="/" class="primary-btn" style="margin-top:8px">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Get started
          </a>
        </div>

        <!-- Error state -->
        <div id="history-error" hidden class="error-panel">
          <p class="error-title">Failed to load history</p>
          <p class="error-message" id="history-error-msg"></p>
          <button id="retry-btn" class="ghost-btn" style="margin-top:4px">Try again</button>
        </div>

      </main>
    </div>
    <script src="history.js"></script>
  </body>
</html>
